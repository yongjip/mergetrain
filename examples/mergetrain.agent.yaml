# Example metadata for an agent/wrapper that wants to discover mergetrain commands.
name: mergetrain-agent-contract
commands:
  status_json: mergetrain status --json
  doctor_json: mergetrain doctor --json
  enqueue: mergetrain enqueue --task "<task>" --branch "<branch>" --capture-sha
  validate_batch: mergetrain run-batch --validate-only
  deploy_batch: mergetrain run-batch --deploy
  daemon_once: mergetrain daemon --once
rules:
  - commit before enqueue
  - do not push deploy refs directly
  - prefer JSON output
  - use --auto only after explicit unattended-deploy approval
