name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) when a GitHub Release is
# published. No API token is stored: configure a PyPI "pending publisher" for
# project `mergetrain` with owner `yongjip`, repo `mergetrain`, workflow
# `release.yml`, and environment `pypi`. See docs/release.md.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
