name: Release

# Builds in an unprivileged job, then publishes the checked artifacts to PyPI
# via Trusted Publishing (OIDC) when a GitHub Release is published. No API token
# is stored. See docs/release.md for the one-time publisher and environment setup.

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify release tag and metadata
        run: python scripts/check_release.py --tag "${GITHUB_REF_NAME}"
      - name: Test and build distributions
        run: |
          python -m pip install --upgrade build twine
          PYTHONPATH=src python -m unittest discover -s tests
          python -m build
          python -m twine check --strict dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # v1.14.1
