name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        # Windows is now verified and blocking (issue #33). One Python version
        # keeps the matrix fast; the pure-Python code path is the same across
        # versions, and the OS-specific behavior is what Windows guards.
        include:
          - os: windows-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Test
        run: python -m pytest -q --cov=mergetrain --cov-report=term-missing

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy

  no-yaml:
    # The package ships zero runtime deps, so the built-in YAML fallback parser
    # is the DEFAULT install path. Every other leg installs .[dev] (which pins
    # PyYAML), so this is the only leg that exercises the fallback in the gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install without the yaml extra
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
      - name: Assert PyYAML is absent
        run: python -c "import importlib.util, sys; sys.exit('PyYAML unexpectedly present' if importlib.util.find_spec('yaml') else 0)"
      - name: Config tests on the fallback parser
        run: python -m pytest tests/test_config.py -q

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify release metadata
        run: python scripts/check_release.py
      - name: Build and inspect distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check --strict dist/*
      - name: Install wheel in a clean environment
        run: |
          python -m venv /tmp/mergetrain-smoke
          /tmp/mergetrain-smoke/bin/python -m pip install --no-deps dist/*.whl
          /tmp/mergetrain-smoke/bin/mergetrain --version
          /tmp/mergetrain-smoke/bin/mergetrain dashboard --help

  e2e:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Drives the installed `mergetrain` CLI through every workflow against real
      # git repos. PYTHON=python pins the interpreter actions/setup-python put on
      # PATH (the script defaults to python3 otherwise).
      - name: End-to-end
        env:
          PYTHON: python
        run: bash scripts/e2e.sh
