name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Test
        run: python -m pytest -q

  # Signal-gathering only (issue #33): Windows is documented as untested, so
  # this leg must never block a merge — it exists to tell us what actually
  # breaks there. Promote it into the blocking matrix once it is green and
  # the issue's checklist is verified.
  test-windows-signal:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Test
        run: python -m pytest -q

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify release metadata
        run: python scripts/check_release.py
      - name: Build and inspect distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check --strict dist/*
      - name: Install wheel in a clean environment
        run: |
          python -m venv /tmp/mergetrain-smoke
          /tmp/mergetrain-smoke/bin/python -m pip install --no-deps dist/*.whl
          /tmp/mergetrain-smoke/bin/mergetrain --version
          /tmp/mergetrain-smoke/bin/mergetrain dashboard --help

  e2e:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Drives the installed `mergetrain` CLI through every workflow against real
      # git repos. PYTHON=python pins the interpreter actions/setup-python put on
      # PATH (the script defaults to python3 otherwise).
      - name: End-to-end
        env:
          PYTHON: python
        run: bash scripts/e2e.sh
